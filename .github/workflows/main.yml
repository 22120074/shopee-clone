name: Build and Push Backend Image

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**" # Quan trọng: Giúp lọc bớt lần build thừa

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: . # Build từ gốc Repo
          file: ./backend/Dockerfile # Trỏ đúng vào Dockerfile trong folder backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/shopee-backend:latest
