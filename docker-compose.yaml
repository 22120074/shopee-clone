  redis:
    image: redis:latest
    container_name: my-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: node-be
    restart: always
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "5000:5000"
    depends_on:
      - db
      - redis
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://postgres:123456789@db:5432/Shoppe_DB
      - REDIS_URL=redis://redis:6379

volumes:
  pgdata:
